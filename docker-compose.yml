

services:
  source-postgres:
    image: postgres:16-alpine
    container_name: shopsphere-source-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${SOURCE_POSTGRES_DB}
      POSTGRES_USER: ${SOURCE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SOURCE_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - source_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres_source/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./infrastructure/postgres_source/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_POSTGRES_USER} -d ${SOURCE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [shopsphere-net]

  source-mongodb:
    image: mongo:7
    container_name: shopsphere-source-mongodb
    env_file: .env
    ports:
      - "27018:27017"
    volumes:
      - source_mongodb_data:/data/db
      - ./infrastructure/mongodb_source/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' -u ${MONGO_INITDB_ROOT_USERNAME} -p ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin | grep 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks: [shopsphere-net]

  mock-api:
    build:
      context: ./infrastructure/mock_api
    container_name: shopsphere-mock-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [shopsphere-net]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: shopsphere-minio
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [shopsphere-net]

  warehouse-postgres:
    image: postgres:16-alpine
    container_name: shopsphere-warehouse-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB}
      POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - warehouse_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/warehouse/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_POSTGRES_USER} -d ${WAREHOUSE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [shopsphere-net]

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: shopsphere-pipeline
    env_file:
      - .env
    depends_on:
      source-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
    networks: [shopsphere-net]

volumes:
  source_postgres_data:
  source_mongodb_data:
  warehouse_postgres_data:
  minio_data:

networks:
  shopsphere-net:
    driver: bridge
