name: SHOPSHERE Project CI

on:
  push:
    branches:
      - main
      - feature/**

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      # Download the repository
      - uses: actions/checkout@v4

      # Install Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements-dev.txt

      - name: Lint code
        run: |
          ruff check .

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v --cov=pipeline --cov-report=term-missing

      # Scan dependencies for known vulnerabilities
      - name: Security scan
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      # - name: Build Docker image
      #   run: |
      #     docker build -t shopsphere -f pipeline/Dockerfile pipeline

      - name: Build Docker image
        run: |
          docker build -t shopsphere:1.0 -f pipeline/Dockerfile .


      - name: Test Docker container starts
        run: |
          docker run --rm shopsphere:1.0 python --version
